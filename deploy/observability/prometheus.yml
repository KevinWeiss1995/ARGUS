global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: argus
    file_sd_configs:
      - files:
          - /etc/prometheus/argus-targets.json
        refresh_interval: 30s
