# /etc/argus/argusd.conf — ARGUS daemon configuration
#
# This file is sourced by the argusd.service systemd unit as an EnvironmentFile.
# Edit values here and restart the service:  systemctl restart argusd
#
# For deployments with TLS/auth, prefer the TOML config file
# (see deploy/examples/integration.toml). Set ARGUS_CONFIG below to use it.
#
# See `argusd --help` for all available flags.

# TOML config file (optional). When set, CLI flags in this env file still
# override values from the TOML. Leave empty to use CLI-only configuration.
# ARGUS_CONFIG=/etc/argus/argusd.toml

# Operating mode: live (eBPF), mock, or replay
ARGUS_MODE=live

# Path to the compiled eBPF object
ARGUS_EBPF_PATH=/usr/lib/argus/argus-ebpf

# Prometheus metrics listen address (host:port)
# Set to [::]:9100 for dual-stack (IPv4+IPv6), 127.0.0.1:9100 for local only
ARGUS_METRICS_ADDR=[::]:9100

# Log level: trace, debug, info, warn, error
ARGUS_LOG_LEVEL=info

# Aggregation window in seconds (detection + metrics reset each window)
ARGUS_WINDOW_SECS=3

# Scheduler integration (optional). Uncomment to enable SLURM drain/resume.
# ARGUS_SCHEDULER=slurm
# Uncomment for dry-run (logs actions without executing):
# ARGUS_SCHEDULER_DRY_RUN=--scheduler-dry-run

# Additional flags (e.g. --seccomp, --action-webhook <url>, --ebpf-hash <hex>)
ARGUS_EXTRA_ARGS=
