# Kubernetes DaemonSet for ARGUS.
#
# Deploys argusd to every node in the cluster. Requires:
#   - Root with explicit capabilities (eBPF, /sys, /proc access)
#   - Host PID and network namespace
#   - The ARGUS container image (build with: docker build -t argus:latest .)
#
# NOTE: privileged:false with explicit caps. SYS_ADMIN is needed on RHEL 8
# kernels (4.18) where CAP_BPF does not exist. On RHEL 9+ (5.14+) you can
# remove SYS_ADMIN and keep only BPF + PERFMON + NET_ADMIN.
#
# For Prometheus Operator users, a ServiceMonitor is included at the bottom.

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: argusd
  namespace: monitoring
  labels:
    app.kubernetes.io/name: argusd
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argusd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argusd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: argusd
          image: argus:latest
          args:
            - "--mode=live"
            - "--ebpf-path=/usr/local/lib/argus/argus-ebpf"
            - "--metrics-addr=0.0.0.0:9100"
            - "--log-level=info"
          securityContext:
            privileged: false
            capabilities:
              add: [SYS_ADMIN, BPF, PERFMON, NET_ADMIN]
              drop: [ALL]
            allowPrivilegeEscalation: false
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100
              protocol: TCP
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: config
              mountPath: /etc/argus
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: proc
          hostPath:
            path: /proc
        - name: config
          configMap:
            name: argusd-config
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: argusd
  namespace: monitoring
  labels:
    app.kubernetes.io/name: argusd
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: argusd
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
---
