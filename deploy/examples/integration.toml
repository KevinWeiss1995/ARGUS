# ARGUS integration configuration -- TLS + auth + detection tuning
# For integration with an existing Prometheus/Grafana stack.
#
# Install: sudo ./scripts/install.sh
# Copy:    sudo cp deploy/examples/integration.toml /etc/argus/argusd.toml
# Certs:   Place TLS cert/key in /etc/argus/tls/
# Token:   echo "my-secret-token" > /etc/argus/token && chmod 600 /etc/argus/token

[agent]
mode = "live"
ebpf_path = "/usr/local/lib/argus/argus-ebpf"
log_level = "info"
window_secs = 3

[metrics]
addr = "0.0.0.0:9100"

[tls]
cert = "/etc/argus/tls/server.crt"
key  = "/etc/argus/tls/server.key"

[auth]
bearer_token_file = "/etc/argus/token"

[detection]
irq_skew_threshold_pct = 70.0
rdma_spike_factor = 5.0
rdma_baseline_latency_ns = 2000
slab_pressure_min_allocs = 100

[actions]
dry_run = false
# webhook_url = "https://alerting.internal/hooks/argus"
