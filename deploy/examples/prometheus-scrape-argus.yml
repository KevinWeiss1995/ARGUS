# Add this snippet to your existing Prometheus prometheus.yml under scrape_configs.
#
# RECOMMENDED: Use file_sd_configs for automatic target management.
# Add nodes with: scripts/argus-manage-targets add <host>
# Scan subnets with: scripts/argus-discover --subnet 10.0.0.0/24 --output targets.json
# Prometheus reloads file_sd targets every 30s — no restart required.

scrape_configs:
  # --- File-based service discovery (recommended) ---
  - job_name: argus
    scrape_interval: 5s
    file_sd_configs:
      - files:
          - /etc/prometheus/argus-targets.json
        refresh_interval: 30s

