# Add this snippet to your existing Prometheus prometheus.yml under scrape_configs.
#
# Adjust targets to list your ARGUS nodes. For service discovery, consider
# file_sd_configs, consul_sd_configs, or kubernetes_sd_configs.
#
# If ARGUS is configured with TLS + bearer auth, include scheme/tls_config/bearer_token_file.

scrape_configs:
  # --- Plain HTTP (standalone / trusted network) ---
  - job_name: argus
    scrape_interval: 5s
    static_configs:
      - targets:
          - "node01:9100"
          - "node02:9100"
          - "node03:9100"
        labels:
          cluster: gpu-cluster

